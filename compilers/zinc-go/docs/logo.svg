<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="zn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4AA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0088CC;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4AA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0088CC;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="120" rx="12" fill="#0D1117"/>
  <!-- Zinc element symbol box -->
  <rect x="16" y="16" width="88" height="88" rx="8" fill="none" stroke="url(#zn)" stroke-width="2.5"/>
  <text x="60" y="48" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="14" fill="#8B949E" text-anchor="middle">30</text>
  <text x="60" y="80" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="36" font-weight="bold" fill="url(#zn)" text-anchor="middle">Zn</text>
  <text x="60" y="96" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="10" fill="#8B949E" text-anchor="middle">65.38</text>
  <!-- Zinc text -->
  <text x="130" y="72" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="48" font-weight="700" fill="#E6EDF3" letter-spacing="-1">zinc</text>
  <!-- Go badge -->
  <rect x="290" y="44" width="52" height="28" rx="6" fill="url(#accent)" opacity="0.15"/>
  <text x="316" y="64" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="16" font-weight="600" fill="url(#accent)" text-anchor="middle">Go</text>
  <!-- Tagline -->
  <text x="130" y="96" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="13" fill="#8B949E">Clean syntax. Native binaries.</text>
</svg>
