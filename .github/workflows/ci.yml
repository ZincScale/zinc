name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check license headers
        run: scripts/check-license-headers.sh

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.23', '1.24', '1.25', '1.26']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          cache: false
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  smoke-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: Ubuntu
            container: ''
          - name: RHEL 8
            container: redhat/ubi8:latest
          - name: RHEL 9
            container: redhat/ubi9:latest
          - name: Amazon Linux 2023
            container: amazonlinux:2023
    name: smoke-test (${{ matrix.name }})
    container: ${{ matrix.container || null }}
    steps:
      - name: Install system deps (RHEL/AL)
        if: matrix.container != ''
        run: |
          if command -v dnf &>/dev/null; then
            dnf install -y git tar gzip
          elif command -v yum &>/dev/null; then
            yum install -y git tar gzip
          fi

      - name: Mark workspace safe for Git
        if: matrix.container != ''
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          cache: false
          go-version: '1.26'

      - name: Build zinc
        run: go build -buildvcs=false -o zinc ./cmd/zinc/

      - name: E2E smoke tests
        env:
          GOFLAGS: -buildvcs=false
        run: scripts/smoke-test.sh ./zinc

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          cache: false
          go-version: '1.26'

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...
