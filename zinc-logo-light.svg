<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="ringGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0088bb"/>
      <stop offset="50%" stop-color="#006699"/>
      <stop offset="100%" stop-color="#003355"/>
    </linearGradient>
    <linearGradient id="ringGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00997a"/>
      <stop offset="50%" stop-color="#007760"/>
      <stop offset="100%" stop-color="#003322"/>
    </linearGradient>
    <linearGradient id="ringGrad3" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#2244cc"/>
      <stop offset="50%" stop-color="#1133aa"/>
      <stop offset="100%" stop-color="#001166"/>
    </linearGradient>
    <radialGradient id="nucleusGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#55aadd"/>
      <stop offset="70%" stop-color="#0077bb"/>
      <stop offset="100%" stop-color="#003366"/>
    </radialGradient>
    <radialGradient id="electronGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="40%" stop-color="#0099cc" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0099cc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#002244"/>
      <stop offset="50%" stop-color="#005588"/>
      <stop offset="100%" stop-color="#0077aa"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Subtle glow behind nucleus -->
  <circle cx="250" cy="195" r="70" fill="#aaddff" opacity="0.2" filter="url(#softGlow)"/>

  <!-- Ring 1: horizontal -->
  <ellipse cx="250" cy="195" rx="130" ry="48"
    fill="none" stroke="url(#ringGrad1)" stroke-width="3.5"
    opacity="0.85" filter="url(#glow)"/>
  <!-- Ring 2: tilted 60° -->
  <ellipse cx="250" cy="195" rx="130" ry="48"
    fill="none" stroke="url(#ringGrad2)" stroke-width="3.5"
    opacity="0.85" filter="url(#glow)"
    transform="rotate(60 250 195)"/>
  <!-- Ring 3: tilted -60° -->
  <ellipse cx="250" cy="195" rx="130" ry="48"
    fill="none" stroke="url(#ringGrad3)" stroke-width="3.5"
    opacity="0.85" filter="url(#glow)"
    transform="rotate(-60 250 195)"/>

  <!-- Nucleus -->
  <circle cx="250" cy="195" r="22" fill="url(#nucleusGrad)" filter="url(#strongGlow)"/>
  <circle cx="250" cy="195" r="16" fill="#88bbdd" opacity="0.3"/>
  <circle cx="243" cy="188" r="6" fill="white" opacity="0.6"/>

  <!-- Electrons -->
  <circle cx="380" cy="195" r="7" fill="url(#electronGlow)" filter="url(#strongGlow)"/>
  <circle cx="380" cy="195" r="4" fill="#0077bb"/>
  <circle cx="153" cy="252" r="7" fill="url(#electronGlow)" filter="url(#strongGlow)"/>
  <circle cx="153" cy="252" r="4" fill="#0077bb"/>
  <circle cx="347" cy="138" r="7" fill="url(#electronGlow)" filter="url(#strongGlow)"/>
  <circle cx="347" cy="138" r="4" fill="#0077bb"/>

  <!-- Zn 30 badge -->
  <circle cx="326" cy="168" r="18" fill="#ddeeff" stroke="#0077aa" stroke-width="1.5" opacity="0.95"/>
  <text x="326" y="165" font-family="'Courier New', monospace" font-size="9" font-weight="bold"
    fill="#005588" text-anchor="middle">Zn</text>
  <text x="326" y="175" font-family="'Courier New', monospace" font-size="8"
    fill="#0077aa" text-anchor="middle" opacity="0.9">30</text>

  <!-- Wordmark -->
  <text x="250" y="348"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="78" font-weight="700" letter-spacing="10"
    fill="url(#textGrad)" text-anchor="middle" filter="url(#glow)">ZINC</text>

  <!-- Decorative lines -->
  <line x1="130" y1="390" x2="370" y2="390" stroke="#0077aa" stroke-width="1" opacity="0.3"/>
  <line x1="200" y1="390" x2="300" y2="390" stroke="#0099cc" stroke-width="1.5" opacity="0.5" filter="url(#glow)"/>
</svg>
