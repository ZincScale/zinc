<svg xmlns="http://www.w3.org/2000/svg" width="480" height="180" viewBox="0 0 480 180">
  <defs>
    <filter id="ink" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="4" seed="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G" result="disp"/>
      <feGaussianBlur in="disp" stdDeviation="0.45" result="blur"/>
      <feBlend in="disp" in2="blur" mode="multiply"/>
    </filter>
  </defs>
  <g filter="url(#ink)">
    <!-- Border -->
    <rect x="2" y="2" width="476" height="176" fill="none" stroke="#18100a" stroke-width="6"/>
    <!-- Top bar -->
    <rect x="2" y="2" width="476" height="32" fill="#18100a"/>
    <text x="20" y="23" font-family="'DM Mono', monospace" font-size="13" font-weight="700" letter-spacing="5" text-transform="uppercase" fill="#e8e0d0">SCRAM</text>
    <text x="380" y="23" font-family="'DM Mono', monospace" font-size="13" font-weight="700" letter-spacing="5" fill="#e8e0d0">AZ-30</text>
    <!-- Main wordmark -->
    <text x="20" y="136" font-family="'Black Ops One', sans-serif" font-size="120" letter-spacing="5" fill="#18100a">Zinc</text>
    <!-- Code -->
    <text x="370" y="132" font-family="'DM Mono', monospace" font-size="28" font-weight="700" fill="#18100a" opacity="0.4">
      <tspan font-size="18" opacity="0.7">A</tspan>-<tspan font-size="34">Z</tspan>30
    </text>
    <!-- Bottom bar -->
    <rect x="2" y="152" width="476" height="26" fill="none" stroke="#18100a" stroke-width="3" stroke-dasharray="0"/>
    <line x1="2" y1="152" x2="478" y2="152" stroke="#18100a" stroke-width="3"/>
    <text x="240" y="170" font-family="'DM Mono', monospace" font-size="11" font-weight="700" letter-spacing="8" text-anchor="middle" fill="#18100a" opacity="0.4">PANIC</text>
  </g>
</svg>
