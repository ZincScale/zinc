# zinc-compiler — Zinc compiler (Java-based)
# Replaces the Go compiler with direct Java AST generation

extends: JavaModule
jvmVersion: 25

javacOptions:
  - --enable-preview
  - --release
  - "25"

forkArgs:
  - --enable-preview

mainClass: zinc.compiler.Main

mvnDeps:
  - com.github.javaparser:javaparser-core:3.27.0
